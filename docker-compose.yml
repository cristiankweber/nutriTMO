services:
  postgres:
    image: postgres:16-alpine
    container_name: nutritmo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutritmo
      POSTGRES_PASSWORD: nutritmo
      POSTGRES_DB: nutritmo
    ports:
      - "5432:5432"
    volumes:
      - nutritmo-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutritmo -d nutritmo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nutritmo-postgres-data:
